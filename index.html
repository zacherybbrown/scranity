<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scranity Blockly</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/blockly/blockly.min.js"></script>
</head>
<body>
<header>
  <h1>Scranity</h1>
  <p>Scratch-style Unity C# Blockly Editor</p>
</header>

<div class="layout">
  <aside class="sidebar">
    <h2>Project</h2>
    <button onclick="newScript()">+ New Script</button>
    <button onclick="exportProject()">Export Blocks JSON</button>
    <button onclick="exportCode()">Export C#</button>
    <button onclick="loadExtension()">Load Custom Extension</button>
    <select id="scriptList" onchange="switchScript()"></select>
  </aside>

  <main>
    <div id="blocklyDiv"></div>
    <h3>Generated C# Preview</h3>
    <pre id="preview"></pre>
  </main>
</div>

<xml id="toolbox" style="display:none"></xml>

<script src="unity-blocks.js"></script>
<script src="app.js"></script>
</body>
</html>
