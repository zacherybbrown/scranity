<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scranity True Codegen</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/blockly/blockly.min.js"></script>
</head>
<body>
<header>
  <h1>Scranity</h1>
  <p>Real Blockly → Real Unity C# Generator</p>
</header>

<div class="layout">
  <aside class="sidebar">
    <button onclick="newScript()">+ New Script</button>
    <button onclick="exportCode()">Export C#</button>
    <select id="scriptList" onchange="switchScript()"></select>
  </aside>

  <main>
    <div id="blocklyDiv"></div>
    <h3>C# Preview</h3>
    <pre id="preview"></pre>
  </main>
</div>

<xml id="toolbox" style="display:none">
  <category name="Events">
    <block type="unity_start"></block>
    <block type="unity_update"></block>
  </category>
  <category name="Logic">
    <block type="unity_if"></block>
  </category>
  <category name="Actions">
    <block type="unity_debug_log"></block>
    <block type="unity_move_forward"></block>
    <block type="unity_rotate_y"></block>
  </category>
</xml>

<script src="app.js"></script>
</body>
</html>
